name: Simple Test Workflow with Email Step and Caching

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 23f2004227@ds.study.iitm.ac.in - Hello World Step
        run: echo "Hello, world! This step is named with my email as required."

      - name: Checkout code
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────
      #  CACHING STEP - THIS IS WHAT THE QUESTION WANTS
      # ────────────────────────────────────────────────
      - name: prime-cache-570e3b9
        id: cache
        uses: actions/cache@v4
        with:
          key: cache-570e3b9
          path: |
            ~/.npm
            node_modules
            ~/.cache/pip
            **/node_modules
          restore-keys: |
            cache-570e3b9-

      - name: Show cache hit/miss result
        run: |
          echo "Cache hit/miss: ${{ steps.cache.outputs.cache-hit }}"

      - name: Run a simple command
        run: |
          echo "Current date:"
          date
          echo "This is a basic GitHub Actions demo with caching."
